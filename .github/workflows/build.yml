name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: ${{ runner.os == 'Windows' && 'pip' || '' }}
          cache-dependency-path: requirements.txt

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "__version__ = \"${GITHUB_REF_NAME#v}\"" > src/oct_viewer/_version.py

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pyinstaller --noconfirm --onedir --windowed \
            --name "OCT Viewer" \
            --paths src \
            --collect-all eyepy \
            --copy-metadata imageio \
            --hidden-import oct_converter.readers.e2e \
            --hidden-import oct_converter.readers.binary_structs.e2e_binary \
            --hidden-import construct \
            --hidden-import PySide6.QtSvg \
            --exclude-module cv2 \
            --exclude-module pydicom \
            --exclude-module imageio_ffmpeg \
            --exclude-module tkinter \
            src/run_app.py

      - name: Build universal macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          PYI_ARGS=(
            --noconfirm --onedir --windowed
            --name "OCT Viewer"
            --paths src
            --collect-all eyepy
            --copy-metadata imageio
            --hidden-import oct_converter.readers.e2e
            --hidden-import oct_converter.readers.binary_structs.e2e_binary
            --hidden-import construct
            --hidden-import PySide6.QtSvg
            --exclude-module cv2
            --exclude-module pydicom
            --exclude-module imageio_ffmpeg
            --exclude-module tkinter
          )

          python3 -m venv .venv-arm64
          source .venv-arm64/bin/activate
          pip install -r requirements.txt pyinstaller
          pyinstaller "${PYI_ARGS[@]}" --target-arch arm64 src/run_app.py
          mv "dist/OCT Viewer.app" "dist/OCT Viewer-arm64.app"
          deactivate
          rm -rf build "OCT Viewer.spec"

          # Separate pip cache per arch: arm64 can cache; x86 must not reuse arm64 wheels.
          arch -x86_64 python3 -m venv .venv-x86
          source .venv-x86/bin/activate
          export PIP_CACHE_DIR="$RUNNER_TEMP/pip-cache-x86"
          arch -x86_64 pip install --no-cache-dir -r requirements.txt pyinstaller
          file .venv-x86/lib/python3.11/site-packages/numpy/_core/_multiarray_umath.cpython-311-darwin.so
          arch -x86_64 pyinstaller --clean "${PYI_ARGS[@]}" --target-arch x86_64 src/run_app.py
          mv "dist/OCT Viewer.app" "dist/OCT Viewer-x86_64.app"
          deactivate

          bash scripts/merge_universal_app.sh \
            "dist/OCT Viewer-arm64.app" \
            "dist/OCT Viewer-x86_64.app" \
            "dist/OCT Viewer.app"
          bash scripts/verify_universal_app.sh "dist/OCT Viewer.app"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/OCT Viewer" -DestinationPath "dist/OCT-Viewer-Windows.zip"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist
          zip -r "OCT-Viewer-macOS.zip" "OCT Viewer.app"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: bash scripts/smoke_test_app.sh "dist/OCT Viewer"

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: bash scripts/smoke_test_app.sh "dist/OCT Viewer.app"

      - uses: actions/upload-artifact@v4
        with:
          name: OCT-Viewer-${{ runner.os }}
          path: dist/OCT-Viewer-*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog section for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Ubuntu's default `awk` is mawk, which mishandles backslash-escaped
          # brackets built via string concatenation (silently turns "\[" into
          # a bare "[", i.e. a regex bracket-expression, never matching) - use
          # index()-based literal substring matching instead, which sidesteps
          # escaping entirely.
          awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { flag=1; next }
            /^## \[/ { flag=0 }
            flag
          ' CHANGELOG.md > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ -s release_notes.md ]; then
            NOTES_FLAG=(--notes-file release_notes.md)
          else
            NOTES_FLAG=(--generate-notes)
          fi
          gh release create "${{ github.ref_name }}" artifacts/*/*.zip \
            --title "${{ github.ref_name }}" \
            "${NOTES_FLAG[@]}"
